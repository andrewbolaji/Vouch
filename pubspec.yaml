name: vouch
description: "Curated Top 10 restaurant rankings per city, voted on by locals."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.3.0
  cloud_functions: ^6.3.1
  cupertino_icons: ^1.0.8
  firebase_analytics: ^12.4.2
  firebase_app_check: ^0.4.4
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.3
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.0.0
  google_fonts: ^6.2.1
  json_annotation: ^4.12.0
  provider: ^6.1.2
  share_plus: ^10.1.4
  shared_preferences: ^2.3.4
  shimmer: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.15
  fake_cloud_firestore: ^4.1.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.3
  very_good_analysis: ^10.1.0

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/demo/
